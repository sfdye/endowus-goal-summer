name: Validate userscript

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check JavaScript syntax
        run: node --check endowus-goal-summer.user.js

      - name: Check userscript metadata block
        run: |
          set -e
          f=endowus-goal-summer.user.js
          for tag in "@name" "@namespace" "@version" "@match" "@downloadURL" "@updateURL"; do
            grep -q "// $tag" "$f" || { echo "::error::missing $tag in metadata"; exit 1; }
          done
          echo "Metadata block OK"
